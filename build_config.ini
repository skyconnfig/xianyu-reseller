[build]
main_script = main.py
icon = assets/icon.ico
name = 咸鱼转卖助手2.0【鱼小铺版】

[pyinstaller]
# 打包选项
onefile = true
windowed = true
console = false

# 包含的文件
add_data = assets;assets
add_data = config;config

# 隐藏导入
hidden_imports = 
    requests,
    urllib3,
    imageio,
    Pillow,
    asyncio,
    concurrent.futures,
    threading,
    queue,
    tkinter,
    ttk,
    json,
    hashlib,
    warnings,
    webbrowser

# 排除模块（减小文件大小）
exclude = 
    matplotlib,
    numpy,
    scipy,
    pandas

[dependencies]
python_version = >=3.13
